name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create the git tag + GitHub Release
  id-token: write # npm Trusted Publishing (OIDC) — no NPM_TOKEN needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Trusted Publishing (OIDC) needs npm >= 11.5.
      - run: npm install -g npm@latest
      - name: Diagnostics
        run: |
          node -v
          npm -v
          echo "OIDC request url present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      # semantic-release computes the version, writes it to package.json (npmPublish:false),
      # and creates the git tag + GitHub Release. It does not publish to npm.
      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Publish via npm Trusted Publishing (OIDC). No custom env block here, so the
      # id-token request vars are present. Skips when semantic-release made no release.
      - name: Publish to npm (OIDC)
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "$VERSION" = "0.0.0-semantically-released" ]; then
            echo "No release this run; nothing to publish."
            exit 0
          fi
          echo "Publishing $VERSION"
          npm publish --loglevel verbose
