name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write # create the git tag + GitHub Release
  id-token: write # npm Trusted Publishing (OIDC) — no NPM_TOKEN needed

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      # Trusted Publishing (OIDC) needs npm >= 11.5.
      - run: npm install -g npm@latest
      - name: Diagnostics
        run: |
          node -v
          npm -v
          echo "OIDC request url present: ${ACTIONS_ID_TOKEN_REQUEST_URL:+yes}"

      - run: npm ci
      - run: npm run format:check
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
